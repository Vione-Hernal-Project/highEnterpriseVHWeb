    function handleDocumentClick(event) {
      const internalLink = event.target.closest("a[data-internal-link='true']");
      if (internalLink) {
        event.preventDefault();
        navigateTo(internalLink.getAttribute("href"));
        return;
      }

      const routeButton = event.target.closest("[data-route]");
      if (routeButton) {
        event.preventDefault();
        navigateTo(routeButton.getAttribute("data-route"));
        return;
      }

      const actionElement = event.target.closest("[data-action]");
      if (actionElement) {
        const action = actionElement.getAttribute("data-action");
        if (action === "toggle-need-help") {
          state.needHelpOpen = !state.needHelpOpen;
          renderApp();
          return;
        }
        if (action === "set-language") {
          state.language = actionElement.getAttribute("data-language") || "EN";
          localStorage.setItem(LANGUAGE_KEY, state.language);
          renderApp();
          return;
        }
        if (action === "toggle-wishlist") {
          toggleWishlist(actionElement.getAttribute("data-product-code"));
          return;
        }
        if (action === "change-cart-qty") {
          changeCartQuantity(actionElement.getAttribute("data-item-key"), Number(actionElement.getAttribute("data-delta") || "0"));
          return;
        }
        if (action === "remove-cart-item") {
          removeCartItem(actionElement.getAttribute("data-item-key"));
          return;
        }
        if (action === "scroll-top") {
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }
        if (action === "open-auth-modal") {
          state.pendingRouteAfterAuth = state.route.type === "checkout" ? "/checkout" : "";
          openAuthModal(actionElement.getAttribute("data-auth-mode") || "signin");
          return;
        }
        if (action === "close-auth-modal") {
          closeAuthModal();
          return;
        }
        if (action === "switch-auth-mode") {
          openAuthModal(actionElement.getAttribute("data-auth-mode") || "signin");
          return;
        }
        if (action === "sign-out") {
          state.authUser = null;
          localStorage.removeItem(AUTH_USER_KEY);
          closeAuthModal();
          showToast("Signed out.");
          renderApp();
          return;
        }
        if (action === "launch-chat") {
          event.preventDefault();
          if (window.Gladly && typeof window.Gladly.show === "function") {
            window.Gladly.show();
          } else {
            window.location.href = "mailto:service@vionehernal.com?subject=Live%20Chat%20Request";
          }
          return;
        }
      }

      if (state.needHelpOpen && !event.target.closest(".js-need-help-wrap")) {
        state.needHelpOpen = false;
        renderApp();
      }
    }

    function handleDocumentSubmit(event) {
      const form = event.target;
      if (!(form instanceof HTMLFormElement)) {
        return;
      }

      if (form.id === "header-search-form") {
        event.preventDefault();
        const formData = new FormData(form);
        const query = String(formData.get("search") || "").trim();
        navigateTo(`/fw/content/s/url?search=${encodeURIComponent(query)}`);
        return;
      }

      if (form.id === "newsletter-signup-form") {
        event.preventDefault();
        const formData = new FormData(form);
        const email = String(formData.get("newsletterEmail") || "").trim();
        if (!isValidEmail(email)) {
          state.newsletterStatus = { message: "Not a valid e-mail address", tone: "error" };
          renderApp();
          return;
        }
        state.newsletterStatus = { message: "Thanks for signing up.", tone: "success" };
        showToast("Newsletter sign-up received.");
        renderApp();
        return;
      }

      if (form.id === "storefront-add-to-cart-form") {
        event.preventDefault();
        const code = form.getAttribute("data-product-code");
        const product = findProductByCode(code, PRODUCTS);
        if (!product) {
          showToast("That product is no longer available.", "error");
          return;
        }
        const formData = new FormData(form);
        const size = String(formData.get("size") || product.sizes[0] || "One Size");
        const quantity = Math.max(1, Number(formData.get("quantity") || "1"));
        const selectedStock = Number(product.inventory?.[size] ?? 0);
        if (selectedStock <= 0) {
          showToast("Please choose an in-stock size.", "error");
          return;
        }
        addToCart(product, size, quantity);
        return;
      }

      if (form.id === "storefront-checkout-form") {
        event.preventDefault();
        placeOrder(form);
        return;
      }

      if (form.id === "storefront-signin-form") {
        event.preventDefault();
        const formData = new FormData(form);
        const email = String(formData.get("email") || "").trim().toLowerCase();
        if (!isValidEmail(email)) {
          openAuthModal("signin", "Please enter a valid email address.");
          return;
        }
        state.authUser = {
          email,
          displayName: deriveDisplayName(email),
        };
        localStorage.setItem(AUTH_USER_KEY, JSON.stringify(state.authUser));
        closeAuthModal();
        showToast("Signed in successfully.");
        if (state.pendingRouteAfterAuth) {
          const route = state.pendingRouteAfterAuth;
          state.pendingRouteAfterAuth = "";
          navigateTo(route);
          return;
        }
        renderApp();
        return;
      }

      if (form.id === "storefront-signup-form") {
        event.preventDefault();
        const formData = new FormData(form);
        const displayName = String(formData.get("displayName") || "").trim();
        const email = String(formData.get("email") || "").trim().toLowerCase();
        if (!displayName) {
          openAuthModal("signup", "Please enter your full name.");
          return;
        }
        if (!isValidEmail(email)) {
          openAuthModal("signup", "Please enter a valid email address.");
          return;
        }
        state.authUser = {
          email,
          displayName,
        };
        localStorage.setItem(AUTH_USER_KEY, JSON.stringify(state.authUser));
        closeAuthModal();
        showToast("Account created successfully.");
        if (state.pendingRouteAfterAuth) {
          const route = state.pendingRouteAfterAuth;
          state.pendingRouteAfterAuth = "";
          navigateTo(route);
          return;
        }
        renderApp();
      }
    }

    function handleDocumentKeydown(event) {
      if (event.key !== "Escape") {
        return;
      }
      if (state.needHelpOpen) {
        state.needHelpOpen = false;
        renderApp();
        return;
      }
      if (state.authModal.open) {
        closeAuthModal();
      }
    }

    function handlePopState() {
      state.needHelpOpen = false;
      renderApp();
    }

    function navigateTo(urlLike) {
      const url = canonicalizeStorefrontUrl(new URL(String(urlLike || "/"), window.location.origin));
      const next = `${url.pathname}${url.search}`;
      if (next !== `${window.location.pathname}${window.location.search}`) {
        window.history.pushState({}, "", next);
      }
      state.needHelpOpen = false;
      renderApp();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function openAuthModal(mode = "signin", message = "", tone = "error") {
      state.authModal = { open: true, mode, message, tone };
      renderApp();
    }

    function closeAuthModal() {
      state.authModal = { open: false, mode: "signin", message: "", tone: "error" };
      renderApp();
    }

    function showToast(message, tone = "success") {
      state.toast = { message, tone };
      clearTimeout(state.toastTimer);
      state.toastTimer = window.setTimeout(() => {
        state.toast = null;
        renderApp();
      }, 2400);
      renderApp();
    }

    function syncBackToTopVisibility() {
      const button = document.querySelector(".js-back-to-top");
      if (!button) {
        return;
      }
      button.style.display = window.scrollY > 250 ? "" : "none";
    }

    function toggleWishlist(productCode) {
      const product = findProductByCode(productCode, PRODUCTS);
      if (!product) {
        showToast("That product is no longer available.", "error");
        return;
      }
      const exists = state.wishlistItems.some((item) => item.code === product.code);
      state.wishlistItems = exists
        ? state.wishlistItems.filter((item) => item.code !== product.code)
        : mergeWishlistItems(state.wishlistItems, [
          normalizeWishlistItem({
            productId: product.code,
            code: product.code,
            name: product.name,
            brand: product.brand,
            price: product.price,
            currency: product.currency,
            image: product.image,
            routePath: product.routePath,
            categorySlug: product.categorySlug,
            categoryLabel: product.categoryLabel,
          }),
        ]);
      persistWishlistItems();
      showToast(`${product.name} ${exists ? "removed from" : "added to"} your wish list.`);
    }

    function addToCart(product, size, quantity) {
      const itemKey = `${product.code}::${size}`;
      const existing = state.cartItems.find((item) => item.itemKey === itemKey);
      state.cartItems = existing
        ? state.cartItems.map((item) => (item.itemKey === itemKey ? { ...item, quantity: item.quantity + quantity } : item))
        : [
          ...state.cartItems,
          normalizeCartItem({
            productId: product.code,
            code: product.code,
            name: product.name,
            brand: product.brand,
            size,
            quantity,
            price: product.price,
            currency: product.currency,
            image: product.image,
            routePath: product.routePath,
          }),
        ];
      persistCartItems();
      showToast(`${product.name} added to your bag.`);
    }

    function changeCartQuantity(itemKey, delta) {
      state.cartItems = state.cartItems.map((item) =>
        item.itemKey === itemKey ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item
      );
      persistCartItems();
      renderApp();
    }

    function removeCartItem(itemKey) {
      state.cartItems = state.cartItems.filter((item) => item.itemKey !== itemKey);
      persistCartItems();
      showToast("Item removed from your bag.");
    }

    function placeOrder(form) {
      if (!state.authUser && AUTH_REQUIRED_FOR_CHECKOUT) {
        state.pendingRouteAfterAuth = "/checkout";
        openAuthModal("signin");
        return;
      }

      const formData = new FormData(form);
      const shipping = {
        fullName: String(formData.get("fullName") || "").trim(),
        email: String(formData.get("email") || "").trim(),
        phone: String(formData.get("phone") || "").trim(),
        address1: String(formData.get("address1") || "").trim(),
        city: String(formData.get("city") || "").trim(),
        province: String(formData.get("province") || "").trim(),
        postalCode: String(formData.get("postalCode") || "").trim(),
        country: String(formData.get("country") || "").trim(),
      };

      const totals = getCartTotals(state.cartItems);
      const order = {
        id: `order-${Date.now()}`,
        orderNumber: `VH-${Date.now().toString().slice(-8)}`,
        status: "processing",
        currency: CURRENCY,
        customer: {
          email: state.authUser?.email || shipping.email,
          displayName: state.authUser?.displayName || shipping.fullName,
        },
        shipping,
        items: state.cartItems.map((item) => ({
          code: item.code,
          name: item.name,
          brand: item.brand,
          size: item.size,
          quantity: item.quantity,
          price: item.price,
          image: item.image,
        })),
        totals,
        createdAt: new Date().toISOString(),
      };

      state.orders = [order, ...(Array.isArray(state.orders) ? state.orders : [])];
      localStorage.setItem(ORDERS_KEY, JSON.stringify(state.orders));
      state.cartItems = [];
      persistCartItems();
      showToast("Order placed successfully.");
      navigateTo("/account/orders");
    }

    function persistCartItems() {
      localStorage.setItem(GUEST_CART_KEY, JSON.stringify({ items: state.cartItems }));
    }

    function persistWishlistItems() {
      localStorage.setItem(GUEST_WISHLIST_KEY, JSON.stringify({ items: state.wishlistItems }));
    }

    function readGuestCart() {
      const parsed = readStoredJson(GUEST_CART_KEY, { items: [] });
      return { items: Array.isArray(parsed.items) ? parsed.items.map(normalizeCartItem) : [] };
    }

    function readGuestWishlist() {
      const parsed = readStoredJson(GUEST_WISHLIST_KEY, { items: [] });
      return { items: Array.isArray(parsed.items) ? parsed.items.map(normalizeWishlistItem) : [] };
    }

    function readAuthUser() {
      const user = readStoredJson(AUTH_USER_KEY, null);
      if (!user || !user.email) {
        return null;
      }
      return {
        email: String(user.email),
        displayName: String(user.displayName || deriveDisplayName(user.email)),
      };
    }

    function readStoredJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function readLocalString(key, fallback) {
      try {
        return localStorage.getItem(key) || fallback;
      } catch (error) {
        return fallback;
      }
    }

    function renderOrdersFallbackMessage() {
      return `<div class="storefront-app-empty"><p class="u-margin-b--none">You have no orders yet.</p></div>`;
    }

    function buildFallbackCategories(products) {
      const categoryRoutes = HOME_PRIMARY_NAV_ITEMS.map((item) =>
        normalizeCategory({ routePath: item.href, name: titleCase(item.label), heroTitle: titleCase(item.label) }, products)
      );
      return dedupeBy(categoryRoutes, (entry) => entry.routePath);
    }

    function normalizeProduct(product) {
      const routePathValue = product.routePath || product.route_path || "";
      const code = product.code || product.id || extractProductCode(routePathValue);
      const categorySlug = slugify(product.categorySlug || product.category_slug || product.categoryLabel || product.category_label || inferCategoryName(product));
      const sizes = Array.isArray(product.sizes) && product.sizes.length ? product.sizes : inferSizes(product);
      const inventory = product.inventory && typeof product.inventory === "object" ? product.inventory : buildInventory(sizes);
      const price = typeof product.price === "number" ? product.price : parsePrice(product.priceLabel || product.price || "");
      const routePath = normalizeRoute(routePathValue || `/product-${slugify(`${product.brand || "item"}-${product.name || code}`)}/${code}/`);

      return {
        id: product.id || code,
        code,
        routePath,
        brand: product.brand || "Designer Edit",
        name: product.name || code,
        description: product.description || `${product.brand || BRAND_NAME} ${product.name || "piece"} selected for the ${BRAND_NAME} storefront.`,
        price,
        priceLabel: product.priceLabel || formatMoney(price, product.currency || CURRENCY),
        currency: product.currency || CURRENCY,
        image: product.image || product.image_url || "",
        hoverImage: product.hoverImage || product.hover_image || product.altImage || product.image || product.image_url || "",
        categorySlug,
        categoryLabel: product.categoryLabel || product.category_label || titleCase(categorySlug.replace(/-/g, " ")),
        department: normalizeDepartment(product.department || "Womens"),
        sizes,
        inventory,
        featured: Boolean(product.featured),
        collectionKeys: Array.isArray(product.collectionKeys)
          ? product.collectionKeys.map((value) => slugify(value))
          : inferProductCollectionKeys(product, categorySlug, Boolean(product.featured)),
        cardClassName: product.cardClassName || "",
      };
    }

    function normalizeCategory(category, products) {
      const routeSource = category.routePath || category.route_path || category.path || "/";
      const routePath = normalizeRoute(routeSource);
      const routeMetadata = getCollectionMetadata(routeSource, category.heroTitle || category.hero_title || category.name || category.slug);
      const collectionKey = slugify(category.collectionKey || category.collection_key || routeMetadata?.key || category.slug || category.name || routePath.split("/").filter(Boolean)[0] || "collection");
      const explicitProductCodes = dedupeBy(
        [
          ...normalizeProductCodeList(category.productCodes || category.product_codes),
          ...normalizeProductCodeList(category.featuredProductCodes || category.featured_product_codes),
          ...extractProductCodesFromRoute(routeSource),
        ],
        (code) => code
      );

      return {
        id: category.id || collectionKey,
        slug: collectionKey,
        collectionKey,
        routePath,
        name: category.name || routeMetadata?.name || titleCase(collectionKey.replace(/-/g, " ")),
        heroTitle: category.heroTitle || category.hero_title || routeMetadata?.heroTitle || category.name || titleCase(collectionKey.replace(/-/g, " ")),
        description:
          category.description ||
          routeMetadata?.description ||
          `Discover the latest ${titleCase(collectionKey.replace(/-/g, " "))} curated for ${BRAND_NAME}.`,
        department: normalizeDepartment(category.department || routeMetadata?.department || "Womens"),
        productCodes: explicitProductCodes,
        featuredProductCodes: explicitProductCodes.length
          ? explicitProductCodes
          : inferFeaturedProducts(routePath, products, {
            collectionKey,
            department: category.department || routeMetadata?.department || "Womens",
            routeSource,
          }).map((product) => product.code),
      };
    }

    function resolveRoute(url) {
      const canonicalUrl = canonicalizeStorefrontUrl(url);
      const routeKey = normalizeRoute(canonicalUrl);
      const path = normalizePath(canonicalUrl.pathname);
      const department = inferDepartmentFromRoute(canonicalUrl);
      const sitePageRoute = resolveSitePageRoute(canonicalUrl, routeKey, department);

      if (sitePageRoute) {
        return sitePageRoute;
      }
      if (path === "/coming-soon") {
        return { type: "comingSoon", routeKey, department, featureKey: normalizeSitePageKey(canonicalUrl.searchParams.get("feature")) };
      }
      if (HOME_ROUTE_KEYS.has(path)) {
        return { type: "home", routeKey, department };
      }
      if (path === "/fw/ShoppingBag.jsp") {
        return { type: "cart", routeKey, department };
      }
      if (path === "/fw/account/WishList.jsp") {
        return { type: "wishlist", routeKey, department };
      }
      if (path === "/checkout") {
        return { type: "checkout", routeKey, department };
      }
      if (path === "/account/orders") {
        return { type: "orders", routeKey, department };
      }
      if (path === "/fw/content/s/url") {
        return { type: "search", routeKey, department, query: String(canonicalUrl.searchParams.get("search") || "").trim() };
      }
      if (path.startsWith("/product-")) {
        return { type: "product", routeKey, code: extractProductCode(path), department };
      }
      if (isCollectionPath(canonicalUrl)) {
        return { type: "collection", routeKey, department, label: deriveRouteLabel(canonicalUrl) };
      }
      return { type: "home", routeKey: "/fw/index.jsp", department: "Womens" };
    }

    function resolveSitePageRoute(url, routeKey, department) {
      const path = normalizePath(url.pathname);
      if (!HOME_ROUTE_KEYS.has(path)) {
        return null;
      }

      const pageKey = normalizeSitePageKey(url.searchParams.get("page"));
      if (pageKey === SITE_PAGE_KEYS.ABOUT) {
        return { type: "about", routeKey, department };
      }
      if (pageKey === SITE_PAGE_KEYS.AFFILIATE) {
        return { type: "affiliate", routeKey, department };
      }
      if (pageKey === SITE_PAGE_KEYS.COMING_SOON) {
        return { type: "comingSoon", routeKey, department, featureKey: normalizeSitePageKey(url.searchParams.get("feature")) };
      }
      return null;
    }

    function canonicalizeStorefrontUrl(input) {
      return input instanceof URL ? new URL(input.toString()) : new URL(String(input || "/"), window.location.origin);
    }

    function isCollectionPath(url) {
      const path = normalizePath(url.pathname);
      if (path.startsWith("/category-") || path.startsWith("/new-arrivals-") || path.startsWith("/sale-")) {
        return true;
      }
      if (path.startsWith("/brand-") || path === "/fw/content/look-books") {
        return true;
      }
      if (path === "/fw/content/landing/beauty") {
        return true;
      }
      if (path === "/fw/Editorials.jsp" && url.searchParams.get("listname")) {
        return true;
      }
      return false;
    }

    function findProduct(route, products) {
      return (
        products.find((product) => product.routePath === route.routeKey) ||
        products.find((product) => product.code === route.code) ||
        products.find((product) => normalizeRoute(product.routePath) === normalizeRoute(route.routeKey))
      );
    }

    function findProductByCode(code, products) {
      return products.find((product) => product.code === code) || null;
    }

    function findCategory(routeKey, fallbackLabel, categories, products) {
      const normalizedRoute = normalizeRoute(routeKey);
      const routeMetadata = getCollectionMetadata(routeKey, fallbackLabel);
      const matchedCategory =
        categories.find((category) => category.routePath === normalizedRoute) ||
        categories.find((category) => routeMetadata && category.collectionKey === routeMetadata.key);

      if (matchedCategory) {
        return matchedCategory;
      }

      const fallbackName = routeMetadata?.name || fallbackLabel || deriveLabelFromRoute(normalizedRoute);
      const collectionKey = routeMetadata?.key || slugify(fallbackName || normalizedRoute);
      return {
        id: collectionKey,
        slug: collectionKey,
        collectionKey,
        routePath: normalizedRoute,
        name: fallbackName,
        heroTitle: routeMetadata?.heroTitle || fallbackName,
        description: routeMetadata?.description || `Discover the latest ${String(fallbackName || "collection").toLowerCase()} curated for ${BRAND_NAME}.`,
        department: "Womens",
        productCodes: [],
        featuredProductCodes: inferFeaturedProducts(normalizedRoute, products, { collectionKey, department: "Womens" }).map((product) => product.code),
      };
    }

    function findProductsForCategory(category, products) {
      return dedupeBy(matchProductsForCategory(category, products), (product) => product.code);
    }

    function searchProducts(searchTerm, products) {
      const queryText = searchTerm.toLowerCase();
      if (!queryText) {
        return [];
      }
      return products.filter((product) =>
        [product.name, product.brand, product.categoryLabel, product.description].some((value) =>
          String(value || "").toLowerCase().includes(queryText)
        )
      );
    }

    function getWishlistProducts(wishlistItems, products) {
      return wishlistItems
        .map((item) => {
          const product = findProductByCode(item.code, products);
          if (product) {
            return product;
          }
          return normalizeProduct({
            id: item.code,
            code: item.code,
            routePath: item.routePath || "/",
            brand: item.brand,
            name: item.name,
            price: item.price,
            currency: item.currency,
            image: item.image,
            hoverImage: item.image,
            categorySlug: item.categorySlug || inferCategorySlugFromText(`${item.brand} ${item.name}`),
            categoryLabel: item.categoryLabel || titleCase((item.categorySlug || "saved items").replace(/-/g, " ")),
            description: `${item.brand} ${item.name} saved to your ${BRAND_NAME} wish list.`,
            sizes: ["One Size"],
            inventory: { "One Size": 1 },
            department: "Womens",
          });
        })
        .filter(Boolean);
    }

    function normalizeCartItem(item) {
      const normalized = {
        productId: item.productId || item.code,
        code: item.code || item.productId,
        name: item.name || "",
        brand: item.brand || "",
        size: item.size || "One Size",
        quantity: Number(item.quantity || 1),
        price: Number(item.price || 0),
        currency: item.currency || CURRENCY,
        image: item.image || "",
        routePath: normalizeRoute(item.routePath || "/"),
      };
      normalized.itemKey = `${normalized.code}::${normalized.size}`;
      return normalized;
    }

    function normalizeWishlistItem(item) {
      return {
        productId: item.productId || item.code,
        code: item.code || item.productId,
        name: item.name || "",
        brand: item.brand || "",
        price: Number(item.price || 0),
        currency: item.currency || CURRENCY,
        image: item.image || "",
        routePath: normalizeRoute(item.routePath || "/"),
        categorySlug: item.categorySlug || "",
        categoryLabel: item.categoryLabel || "",
      };
    }

    function mergeWishlistItems(primaryItems, secondaryItems) {
      const merged = new Map();
      [...primaryItems, ...secondaryItems].map(normalizeWishlistItem).forEach((item) => {
        if (!item.code || merged.has(item.code)) {
          return;
        }
        merged.set(item.code, { ...item });
      });
      return Array.from(merged.values());
    }

    function getCartTotals(items) {
      const subtotal = items.reduce((total, item) => total + item.price * item.quantity, 0);
      const shipping = Number(SHIPPING_FLAT_RATE || 0);
      const total = subtotal + shipping;
      return {
        subtotal,
        shipping,
        total,
        subtotalLabel: formatMoney(subtotal, CURRENCY),
        shippingLabel: formatMoney(shipping, CURRENCY),
        totalLabel: formatMoney(total, CURRENCY),
      };
    }

    function getCollectionMetadata(input, fallbackLabel = "") {
      const url = input instanceof URL ? input : new URL(String(input || "/"), window.location.origin);
      const path = normalizePath(url.pathname);
      const department = slugify(inferDepartmentFromRoute(url));
      const listname = String(url.searchParams.get("listname") || "").trim().toLowerCase();
      const definition = COLLECTION_ROUTE_DEFINITIONS.find((entry) => entry.matches({ url, path, department, listname }));
      if (definition) {
        return { ...definition, department: inferDepartmentFromRoute(url) };
      }

      if (path.startsWith("/brand-")) {
        const brandName = titleCase((fallbackLabel || path.replace(/^\/brand-/, "").split("/")[0] || "Brand").replace(/-/g, " "));
        return {
          key: `brand:${slugify(brandName)}`,
          name: brandName,
          heroTitle: brandName,
          description: `Discover ${brandName} curated for ${BRAND_NAME}.`,
          department: inferDepartmentFromRoute(url),
        };
      }

      return null;
    }

    function normalizeSitePageKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function getComingSoonFeatureTitle(featureKey) {
      return COMING_SOON_FEATURE_TITLES[normalizeSitePageKey(featureKey)] || "Coming Soon";
    }

    function normalizeDepartment(value) {
      return /^mens?$/i.test(String(value || "").trim()) ? "Mens" : "Womens";
    }

    function normalizeProductCodeList(value) {
      const items = Array.isArray(value) ? value : typeof value === "string" ? value.split(",") : [];
      return items.map((entry) => String(entry || "").trim().toUpperCase()).filter((entry) => /^[A-Z0-9]+-[A-Z0-9]+$/.test(entry));
    }

    function extractProductCodesFromRoute(input) {
      try {
        const url = input instanceof URL ? input : new URL(String(input || "/"), window.location.origin);
        return normalizeProductCodeList(url.searchParams.get("featuredCodes") || "");
      } catch (error) {
        return [];
      }
    }

    function inferProductCollectionKeys(product, categorySlug, featured) {
      const keys = new Set();
      const addKey = (value) => {
        const normalized = slugify(value);
        if (normalized) {
          keys.add(normalized);
        }
      };
      addKey(categorySlug);
      addKey(product.categoryLabel || product.category_label || categorySlug);
      addKey(product.department || "Womens");
      addKey(product.collectionKey || product.collection_key);
      const routePath = normalizePath(new URL(String(product.routePath || product.route_path || "/"), window.location.origin).pathname);
      if (routePath.startsWith("/sale-")) {
        keys.add("sale");
      }
      const brandSlug = slugify(product.brand || "");
      if (brandSlug) {
        keys.add(`brand:${brandSlug}`);
      }
      if (featured) {
        keys.add("new");
        keys.add("shops");
      }
      return Array.from(keys);
    }

    function matchProductsForCategory(category, products) {
      const explicitCodes = normalizeProductCodeList(category.productCodes || category.product_codes);
      if (explicitCodes.length) {
        return products.filter((product) => explicitCodes.includes(product.code));
      }

      const collectionKey = slugify(category.collectionKey || category.slug || category.name || "");
      const routePath = normalizePath(new URL(String(category.routePath || "/"), window.location.origin).pathname);
      const baseMatches = products.filter((product) => productMatchesCategory(product, collectionKey, routePath));
      if (baseMatches.length) {
        return baseMatches;
      }
      if (["womens", "new", "shops"].includes(collectionKey)) {
        return products;
      }
      return [];
    }

    function productMatchesCategory(product, collectionKey, routePath) {
      const productCategoryKey = slugify(product.categorySlug || product.categoryLabel || "");
      const productCollectionKeys = new Set(Array.isArray(product.collectionKeys) ? product.collectionKeys.map((value) => slugify(value)) : []);
      switch (collectionKey) {
        case "womens":
          return normalizeDepartment(product.department) === "Womens";
        case "new":
          return Boolean(product.featured) || productCollectionKeys.has("new");
        case "clothing":
          return productCategoryKey === "clothing";
        case "dresses":
          return productCategoryKey === "dresses";
        case "shoes":
          return productCategoryKey === "shoes";
        case "bags":
          return productCategoryKey === "bags";
        case "accessories":
          return productCategoryKey === "accessories";
        case "beauty":
          return productCategoryKey === "beauty";
        case "sale":
          return productCollectionKeys.has("sale");
        case "shops":
          return productCollectionKeys.has("shops") || Boolean(product.featured);
        default:
          if (routePath.startsWith("/brand-")) {
            const brandKey = `brand:${slugify(routePath.replace(/^\/brand-/, "").split("/")[0])}`;
            return productCollectionKeys.has(brandKey);
          }
          return productCategoryKey === collectionKey || productCollectionKeys.has(collectionKey);
      }
    }

    function inferFeaturedProducts(routePath, products, categoryOverrides = {}) {
      const routeMetadata = getCollectionMetadata(routePath, categoryOverrides.heroTitle || categoryOverrides.name);
      const category = {
        routePath: normalizeRoute(routePath),
        collectionKey: categoryOverrides.collectionKey || routeMetadata?.key || slugify(deriveLabelFromRoute(routePath)),
        department: categoryOverrides.department || routeMetadata?.department || inferDepartmentFromRoute(routePath),
        productCodes: categoryOverrides.productCodes || extractProductCodesFromRoute(categoryOverrides.routeSource || routePath),
      };
      const matches = matchProductsForCategory(category, products);
      return matches.length ? matches.slice(0, 8) : products.slice(0, 8);
    }

    function inferCategoryName(product) {
      return inferCategorySlugFromText(`${product.brand || ""} ${product.name || ""}`);
    }

    function inferCategorySlugFromText(text) {
      const lowered = text.toLowerCase();
      if (lowered.includes("bag") || lowered.includes("card case") || lowered.includes("tote")) {
        return "bags";
      }
      if (lowered.includes("flat") || lowered.includes("sandal") || lowered.includes("shoe") || lowered.includes("ballerine")) {
        return "shoes";
      }
      if (lowered.includes("tee") || lowered.includes("tank") || lowered.includes("top") || lowered.includes("set")) {
        return "clothing";
      }
      if (lowered.includes("pareo") || lowered.includes("swim")) {
        return "beauty";
      }
      return "new-arrivals";
    }

    function inferSizes(product) {
      const label = `${product.name || ""} ${product.categoryLabel || ""}`.toLowerCase();
      if (label.includes("shoe") || label.includes("flat") || label.includes("ballerine")) {
        return ["36", "37", "38", "39", "40"];
      }
      if (label.includes("bag") || label.includes("card case")) {
        return ["One Size"];
      }
      return ["XS", "S", "M", "L"];
    }

    function buildInventory(sizes) {
      return sizes.reduce((inventory, size, index) => {
        inventory[size] = Math.max(1, 6 - index);
        return inventory;
      }, {});
    }

    function deriveRouteLabel(url) {
      const routeMetadata = getCollectionMetadata(url);
      if (routeMetadata?.heroTitle) {
        return routeMetadata.heroTitle;
      }
      if (url instanceof URL && url.pathname === "/fw/Editorials.jsp") {
        return titleCase((url.searchParams.get("listname") || "Editorial").replace(/[+]/g, " "));
      }
      return deriveLabelFromRoute(normalizeRoute(url));
    }

    function deriveLabelFromRoute(routeKey) {
      const routeMetadata = getCollectionMetadata(routeKey);
      if (routeMetadata?.heroTitle) {
        return routeMetadata.heroTitle;
      }
      const [path, queryString] = String(routeKey).split("?");
      if (queryString) {
        const params = new URLSearchParams(queryString);
        if (params.get("listname")) {
          return titleCase(params.get("listname").replace(/[+]/g, " "));
        }
      }
      const lastSegment = path
        .split("/")
        .filter(Boolean)
        .find((segment) => !/^[a-z0-9]{6,}$/i.test(segment));
      return titleCase((lastSegment || "Collection").replace(/^(category|product|new-arrivals|sale|brand)-/i, "").replace(/-/g, " "));
    }

    function normalizeRoute(input) {
      const url = input instanceof URL ? input : new URL(String(input || "/"), window.location.origin);
      const path = normalizePath(url.pathname);
      const params = new URLSearchParams();
      ["listname", "d", "search", "page", "feature"].forEach((key) => {
        const value = url.searchParams.get(key);
        if (value) {
          params.set(key, key === "search" ? value.trim() : value.trim());
        }
      });
      const queryString = params.toString();
      return queryString ? `${path}?${queryString}` : path;
    }

    function normalizePath(pathname) {
      if (!pathname) {
        return "/";
      }
      const cleaned = pathname.replace(/\/{2,}/g, "/");
      if (cleaned === "/") {
        return cleaned;
      }
      return cleaned.endsWith("/") ? cleaned.slice(0, -1) : cleaned;
    }

    function inferDepartmentFromRoute() {
      return "Womens";
    }

    function extractProductCode(value) {
      const path = (() => {
        try {
          return new URL(String(value || "/"), window.location.origin).pathname;
        } catch (error) {
          return String(value || "").split("?")[0].split("#")[0];
        }
      })();
      const segments = path.split("/").filter(Boolean);
      const lastSegment = segments[segments.length - 1] || "";
      return /^[A-Z0-9]+-[A-Z0-9]+$/i.test(lastSegment) ? lastSegment.toUpperCase() : "";
    }

    function parsePrice(value) {
      const numeric = Number(String(value || "").replace(/[^\d.]/g, ""));
      return Number.isFinite(numeric) ? numeric : 0;
    }

    function formatMoney(amount, currency) {
      return new Intl.NumberFormat(CURRENCY_LOCALE, {
        style: "currency",
        currency: currency || CURRENCY,
        minimumFractionDigits: 2,
      }).format(Number(amount || 0));
    }

    function formatDate(timestamp) {
      if (!timestamp) {
        return "";
      }
      return new Intl.DateTimeFormat("en-PH", { dateStyle: "medium", timeStyle: "short" }).format(new Date(timestamp));
    }

    function titleCase(value) {
      return String(value || "")
        .replace(/\s+/g, " ")
        .trim()
        .split(" ")
        .map((segment) => segment.charAt(0).toUpperCase() + segment.slice(1))
        .join(" ");
    }

    function slugify(value) {
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function deriveDisplayName(email) {
      if (!email) {
        return "Customer";
      }
      return titleCase(String(email).split("@")[0].replace(/[._-]+/g, " "));
    }

    function dedupeBy(items, getKey) {
      const seen = new Set();
      return items.filter((item) => {
        const key = getKey(item);
        if (!key || seen.has(key)) {
          return false;
        }
        seen.add(key);
        return true;
      });
    }

    function findCategoryRouteBySlug(slug) {
      const item = HOME_PRIMARY_NAV_ITEMS.find((entry) => slugify(entry.label) === slug);
      return item ? item.href : "/fw/index.jsp";
    }

    function getUserProfileDefaults() {
      return {
        fullName: state.authUser?.displayName || "",
        email: state.authUser?.email || "",
        phone: "",
        address1: "",
        city: "",
        province: "",
        postalCode: "",
        country: "Philippines",
      };
    }

    function getPageTitle(route) {
      if (route.type === "home") return "Vione Hernal: The Online Destination for Premier Luxury Fashion";
      if (route.type === "about") return `About Us | ${BRAND_NAME}`;
      if (route.type === "affiliate") return `Affiliate | ${BRAND_NAME}`;
      if (route.type === "comingSoon") return `${getComingSoonFeatureTitle(route.featureKey)} | ${BRAND_NAME}`;
      if (route.type === "collection") return `${findCategory(route.routeKey, route.label, CATEGORIES, PRODUCTS).heroTitle} | ${BRAND_NAME}`;
      if (route.type === "product") {
        const product = findProduct(route, PRODUCTS);
        return product ? `${product.brand} ${product.name} | ${BRAND_NAME}` : `Not Found | ${BRAND_NAME}`;
      }
      if (route.type === "cart") return `My Bag | ${BRAND_NAME}`;
      if (route.type === "wishlist") return `Wish List | ${BRAND_NAME}`;
      if (route.type === "checkout") return `Checkout | ${BRAND_NAME}`;
      if (route.type === "orders") return `Order History | ${BRAND_NAME}`;
      if (route.type === "search") return `Search | ${BRAND_NAME}`;
      return BRAND_NAME;
    }

    function isValidEmail(email) {
      return /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/.test(String(email || "").trim());
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function brandLogo(className, fontSize, text) {
      return `
    <span class="${className}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420.23 102.23" aria-hidden="true" focusable="false" role="presentation">
        <text x="210.115" y="56" fill="currentColor" text-anchor="middle" dominant-baseline="middle" font-family="'Arial Black', Montserrat, 'Helvetica Neue', Arial, sans-serif" font-size="${fontSize}" font-weight="700" textLength="388" lengthAdjust="spacingAndGlyphs">${escapeHtml(text)}</text>
      </svg>
    </span>
  `;
    }

      return '<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false" role="presentation"><path d="M7.093 2.228a4.129 4.129 0 0 0-5.876 0 4.218 4.218 0 0 0 0 5.928L8 15l6.783-6.844a4.219 4.219 0 0 0 0-5.928 4.129 4.129 0 0 0-5.876 0L8 3.143z" /></svg>';

      return '<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false" role="presentation"><path d="M14.8 5.3h-2.5v-.8c0-2.4-2-4.3-4.4-4.3s-4.3 2-4.3 4.3v.7H1.2l-1 10.5h15.6l-1-10.4zM4.6 4.5c0-1.8 1.5-3.3 3.4-3.3s3.4 1.5 3.4 3.3v.7H4.6v-.7zM1.3 14.8l.8-8.5H14l.8 8.5H1.3z" /></svg>';

      return '<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false" role="presentation"><path d="M5.5,16a1,1,0,0,1-.71-1.71L11.09,8,4.79,1.71A1,1,0,0,1,6.21.29l7,7a1,1,0,0,1,0,1.41l-7,7A1,1,0,0,1,5.5,16Z" /></svg>';
    }

    function iconArrowUpStem() {
      return '<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false" role="presentation"><path d="M12.288 4.095L8.538.228a.771.771 0 0 0-1.076 0l-3.75 3.867a.75.75 0 1 0 1.076 1.044L7.25 2.6v12.65a.75.75 0 0 0 1.5 0V2.6l2.462 2.538a.75.75 0 1 0 1.076-1.044z" /></svg>';
    }

    function iconPrivacyChoices() {
      return '<svg xmlns="http://www.w3.org/2000/svg" xml:space="preserve" style="enable-background:new 0 0 30 14" viewBox="0 0 30 14" aria-hidden="true"><path d="M7.4 12.8h6.8l3.1-11.6H7.4C4.2 1.2 1.6 3.8 1.6 7s2.6 5.8 5.8 5.8z" style="fill-rule:evenodd;clip-rule:evenodd;fill:#fff" /><path d="M22.6 0H7.4c-3.9 0-7 3.1-7 7s3.1 7 7 7h15.2c3.9 0 7-3.1 7-7s-3.2-7-7-7zm-21 7c0-3.2 2.6-5.8 5.8-5.8h9.9l-3.1 11.6H7.4c-3.2 0-5.8-2.6-5.8-5.8z" style="fill-rule:evenodd;clip-rule:evenodd;fill:#06f" /><path d="M24.6 4c.2.2.2.6 0 .8L22.5 7l2.2 2.2c.2.2.2.6 0 .8-.2.2-.6.2-.8 0l-2.2-2.2-2.2 2.2c-.2.2-.6.2-.8 0-.2-.2-.2-.6 0-.8L20.8 7l-2.2-2.2c-.2-.2-.2-.6 0-.8.2-.2.6-.2.8 0l2.2 2.2L23.8 4c.2-.2.6-.2.8 0z" style="fill:#fff" /><path d="M12.7 4.1c.2.2.3.6.1.8L8.6 9.8c-.1.1-.2.2-.3.2-.2.1-.5.1-.7-.1L5.4 7.7c-.2-.2-.2-.6 0-.8.2-.2.6-.2.8 0L8 8.6l3.8-4.5c.2-.2.6-.2.9 0z" style="fill:#06f" /></svg>';
    }
  </script>
